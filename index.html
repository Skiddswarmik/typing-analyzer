var KB_ROWS=[['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M']];

function shuffle(a){return[...a].sort(function(){return Math.random()-0.5;});}
function getWordPool(){
  return (typeof WORD_BANK!=='undefined'&&WORD_BANK.length>0)
    ?WORD_BANK
    :WORD_POOL;
}
function genWords(n){var pool=getWordPool();var r=[];while(r.length<n)r.push.apply(r,shuffle(pool));return r.slice(0,n);}
function heatColor(e,m){
  if(!e||!m)return'#111';
  var t=Math.min(e/m,1),v=Math.round(17+t*220);
  return'rgb('+v+','+v+','+v+')';
}

function genPracticeWords(weakKeys,weakBigrams,n){
  var scored=getWordPool().map(function(word){
    var u=word.toUpperCase(),score=0;
    weakKeys.forEach(function(k){for(var i=0;i<u.length;i++)if(u[i]===k)score+=3;});
    weakBigrams.forEach(function(bg){var idx=0;while((idx=u.indexOf(bg,idx))!==-1){score+=6;idx++;}});
    return {word:word,score:score};
  });
  var hits=scored.filter(function(x){return x.score>0;}).sort(function(a,b){return b.score-a.score;});
  var pool=[];
  var src=hits.length>0?hits:scored.sort(function(a,b){return b.score-a.score;});
  var top=src.slice(0,Math.min(src.length,20));
  while(pool.length<n)pool=pool.concat(shuffle(top.map(function(x){return x.word;})));
  return pool.slice(0,n);
}

function buildAnalysis(errMap,bigramMap){
  var keys=Object.keys(errMap).sort(function(a,b){return errMap[b]-errMap[a];});
  var weakKeys=keys.slice(0,4);
  var bigrams=Object.keys(bigramMap).sort(function(a,b){return bigramMap[b]-bigramMap[a];});
  var weakBigrams=bigrams.filter(function(bg){return bigramMap[bg]>=2;}).slice(0,3);
  var practiceWords=genPracticeWords(weakKeys,weakBigrams,50);
  return {weakKeys:weakKeys,weakBigrams:weakBigrams,practiceWords:practiceWords,errMap:errMap,bigramMap:bigramMap};
}


var FINGER_MAP=[
  {id:'LP',label:'L. Pinky', hand:'L', keys:['q','a','z']},
  {id:'LR',label:'L. Ring',  hand:'L', keys:['w','s','x']},
  {id:'LM',label:'L. Middle',hand:'L', keys:['e','d','c']},
  {id:'LI',label:'L. Index', hand:'L', keys:['r','f','v','t','g','b']},
  {id:'RI',label:'R. Index', hand:'R', keys:['y','h','n','u','j','m']},
  {id:'RM',label:'R. Middle',hand:'R', keys:['i','k']},
  {id:'RR',label:'R. Ring',  hand:'R', keys:['o','l']},
  {id:'RP',label:'R. Pinky', hand:'R', keys:['p']}
];

function genFingerWords(selectedIds,n){
  var keys=[];
  FINGER_MAP.forEach(function(f){if(selectedIds.indexOf(f.id)!==-1)keys=keys.concat(f.keys);});
  if(keys.length===0)keys=['a','s','d','f','j','k','l'];
  var vowels=keys.filter(function(k){return'aeiou'.indexOf(k)!==-1;});
  var cons=keys.filter(function(k){return'aeiou'.indexOf(k)===-1;});
  var words=[];
  for(var i=0;i<n;i++){
    var len=3+Math.floor(Math.random()*3);
    var word='';
    if(vowels.length>0&&cons.length>0){
      var startV=Math.random()<0.3;
      for(var j2=0;j2<len;j2++){
        var wantVowel=(j2%2===0)?startV:!startV;
        var pool=wantVowel?vowels:cons;
        word+=pool[Math.floor(Math.random()*pool.length)];
      }
    } else {
      for(var j3=0;j3<len;j3++) word+=keys[Math.floor(Math.random()*keys.length)];
    }
    words.push(word);
  }
  return words;
}

function TypeMaster(){
  var s1=useState('time'),    mode=s1[0],          setMode=s1[1];
  var s2=useState(60),        timeOpt=s2[0],        setTimeOpt=s2[1];
  var s3=useState(25),        wordsOpt=s3[0],       setWordsOpt=s3[1];
  var s4=useState([]),        words=s4[0],          setWords=s4[1];
  var s5=useState(null),      activeQuote=s5[0],    setActiveQuote=s5[1];
  var s6=useState('idle'),    phase=s6[0],          setPhase=s6[1];
  var s7=useState([]),        completedWords=s7[0], setCompletedWords=s7[1];
  var s8=useState(0),         wordIdx=s8[0],        setWordIdx=s8[1];
  var s9=useState(''),        curInput=s9[0],       setCurInput=s9[1];
  var s10=useState(60),       timeLeft=s10[0],      setTimeLeft=s10[1];
  var s11=useState(0),        liveWpm=s11[0],       setLiveWpm=s11[1];
  var s12=useState({}),       keyErrors=s12[0],     setKeyErrors=s12[1];
  var s13=useState([]),       wpmHist=s13[0],       setWpmHist=s13[1];
  var s14=useState(null),     results=s14[0],       setResults=s14[1];
  var s15=useState(0),        scrollOffset=s15[0],  setScrollOffset=s15[1];
  var s16=useState(20),       dimLevel=s16[0],      setDimLevel=s16[1];
  var s17=useState(false),    showSettings=s17[0],  setShowSettings=s17[1];
  var s18=useState(0),        quoteCount=s18[0],    setQuoteCount=s18[1];
  var s19=useState('none'),   practicePhase=s19[0], setPracticePhase=s19[1];
  var s20=useState(null),     analysisData=s20[0],  setAnalysisData=s20[1];
  var s21=useState(null),     banner=s21[0],        setBanner=s21[1];
  var s22=useState([]),       selFingers=s22[0],    setSelFingers=s22[1];
  var s23=useState('time'),   fingerSub=s23[0],     setFingerSub=s23[1];

  var inputRef    =useRef(null);
  var timerRef    =useRef(null);
  var wordRefs    =useRef({});
  var containerRef=useRef(null);
  var modeRef     =useRef(mode);
  var timeOptRef  =useRef(timeOpt);
  var wordsRf     =useRef([]);
  var completedRf =useRef([]);
  var wordIdxRf   =useRef(0);
  var keyErrRf    =useRef({});
  var bigramErrRf =useRef({});
  var wpmHistRf   =useRef([]);
  var correctRf   =useRef(0);
  var startRf     =useRef(0);
  var phaseRef    =useRef('idle');
  var curInputRef =useRef('');
  var quoteCountRf       =useRef(0);
  var practicePhaseRef   =useRef('none');
  var quoteStreakErrRf   =useRef({});
  var quoteStreakBigramRf=useRef({});
  var practiceBaseRateRf =useRef(0);
  var selFingersRf=useRef([]);
  var fingerSubRef=useRef('time');
  useEffect(function(){selFingersRf.current=selFingers;},[selFingers]);
  useEffect(function(){fingerSubRef.current=fingerSub;},[fingerSub]);

  useEffect(function(){modeRef.current=mode;},[mode]);
  useEffect(function(){timeOptRef.current=timeOpt;},[timeOpt]);
  useEffect(function(){practicePhaseRef.current=practicePhase;},[practicePhase]);
  useEffect(function(){
    if(mode!=='quotes'){
      quoteCountRf.current=0;setQuoteCount(0);
      quoteStreakErrRf.current={};quoteStreakBigramRf.current={};
    }
  },[mode]);
  useEffect(function(){
    var el=wordRefs.current[wordIdx];
    if(!el)return;
    var gap=el.offsetTop>0?56:0;
    setScrollOffset(Math.max(0,el.offsetTop-gap));
  },[wordIdx]);

  var doFinish=useCallback(function(){
    clearInterval(timerRef.current);
    var elapsed=(Date.now()-startRf.current)/1000;
    var mins=Math.max(elapsed/60,0.001);
    var wpm=Math.round(correctRf.current/mins)||0;
    var used=wordsRf.current.slice(0,completedRf.current.length);
    var avgLen=used.length>0?used.reduce(function(s,w){return s+w.length;},0)/used.length:5;
    var totalCh=completedRf.current.reduce(function(s,c){return s+c.input.length+1;},0);
    var rawWpm=Math.round(totalCh/avgLen/mins)||0;

    if(practicePhaseRef.current==='drilling'){
      var totalDrillErr=Object.values(keyErrRf.current).reduce(function(s,v){return s+v;},0);
      var base=practiceBaseRateRf.current;
      var msg,btype;
      if(base===0||totalDrillErr===0){msg='\u2605 Flawless drill! Zero errors on those letters.';btype='great';}
      else if(totalDrillErr<base*0.55){msg='\u2191 Big improvement! Your accuracy on those letters jumped significantly.';btype='great';}
      else if(totalDrillErr<base*0.8){msg='\u2191 Getting better! A few more rounds and it will stick.';btype='good';}
      else{msg='Keep at it \u2014 muscle memory takes time. Consistency wins.';btype='neutral';}
      setBanner({message:msg,btype:btype});
      setTimeout(function(){setBanner(null);},6000);
      setPracticePhase('none');practicePhaseRef.current='none';
      setResults({wpm:wpm,rawWpm:rawWpm,wpmHist:wpmHistRf.current.slice(),keyErrors:Object.assign({},keyErrRf.current)});
      setPhase('results');phaseRef.current='results';
      return;
    }

    if(modeRef.current==='quotes'){
      Object.keys(keyErrRf.current).forEach(function(k){
        quoteStreakErrRf.current[k]=(quoteStreakErrRf.current[k]||0)+keyErrRf.current[k];
      });
      Object.keys(bigramErrRf.current).forEach(function(bg){
        quoteStreakBigramRf.current[bg]=(quoteStreakBigramRf.current[bg]||0)+bigramErrRf.current[bg];
      });
      var newCount=quoteCountRf.current+1;
      quoteCountRf.current=newCount;setQuoteCount(newCount);
      if(newCount>=3){
        var aData=buildAnalysis(quoteStreakErrRf.current,quoteStreakBigramRf.current);
        practiceBaseRateRf.current=Object.values(quoteStreakErrRf.current).reduce(function(s,v){return s+v;},0);
        quoteStreakErrRf.current={};quoteStreakBigramRf.current={};
        quoteCountRf.current=0;setQuoteCount(0);
        setAnalysisData(aData);
        setPracticePhase('analysis');practicePhaseRef.current='analysis';
        setPhase('results');phaseRef.current='results';
        return;
      }
    }

    setResults({wpm:wpm,rawWpm:rawWpm,wpmHist:wpmHistRf.current.slice(),keyErrors:Object.assign({},keyErrRf.current)});
    setPhase('results');phaseRef.current='results';
  },[]);

  var init=useCallback(function(){
    clearInterval(timerRef.current);
    wordRefs.current={};
    var w,quote=null;
    if(mode==='quotes'){quote=QUOTES[Math.floor(Math.random()*QUOTES.length)];w=quote.text.toLowerCase().split(' ');}
    else if(mode==='words'){w=genWords(wordsOpt);}
    else if(mode==='fingers'){w=genFingerWords(selFingersRf.current,fingerSubRef.current==='time'?300:wordsOpt);}
    else{w=genWords(350);}
    wordsRf.current=w;completedRf.current=[];wordIdxRf.current=0;
    keyErrRf.current={};bigramErrRf.current={};wpmHistRf.current=[];correctRf.current=0;
    startRf.current=0;curInputRef.current='';phaseRef.current='idle';
    setWords(w);setActiveQuote(quote);setPhase('idle');setCompletedWords([]);
    setWordIdx(0);setCurInput('');setTimeLeft(timeOpt);setLiveWpm(0);
    setKeyErrors({});setWpmHist([]);setResults(null);setScrollOffset(0);
    if(practicePhaseRef.current!=='analysis'){setPracticePhase('none');practicePhaseRef.current='none';}
    setTimeout(function(){if(inputRef.current)inputRef.current.focus();},80);
  },[mode,timeOpt,wordsOpt]);

  var initDrill=useCallback(function(aData){
    clearInterval(timerRef.current);
    wordRefs.current={};
    var w=aData.practiceWords;
    wordsRf.current=w;completedRf.current=[];wordIdxRf.current=0;
    keyErrRf.current={};bigramErrRf.current={};wpmHistRf.current=[];correctRf.current=0;
    startRf.current=0;curInputRef.current='';phaseRef.current='idle';
    setWords(w);setPhase('idle');setCompletedWords([]);
    setWordIdx(0);setCurInput('');setLiveWpm(0);
    setKeyErrors({});setWpmHist([]);setResults(null);setScrollOffset(0);
    setPracticePhase('drilling');practicePhaseRef.current='drilling';
    setTimeout(function(){if(inputRef.current)inputRef.current.focus();},80);
  },[]);

  useEffect(function(){init();},[init]);

  var startTyping=useCallback(function(){
    phaseRef.current='typing';setPhase('typing');startRf.current=Date.now();
    timerRef.current=setInterval(function(){
      var elapsed=(Date.now()-startRf.current)/1000;
      var wpm=Math.round(correctRf.current/(elapsed/60))||0;
      wpmHistRf.current=wpmHistRf.current.concat([{t:Math.round(elapsed),wpm:wpm}]);
      setWpmHist(wpmHistRf.current.slice());setLiveWpm(wpm);
      if(modeRef.current==='time'||(modeRef.current==='fingers'&&fingerSubRef.current==='time')){
        var rem=Math.max(0,timeOptRef.current-Math.floor(elapsed));
        setTimeLeft(rem);if(rem<=0)doFinish();
      }
    },1000);
  },[doFinish]);

  var handleKeyDown=useCallback(function(e){
    if(e.key==='Tab'||e.key==='Escape'){e.preventDefault();init();return;}
    if(e.key==='Backspace'&&curInputRef.current===''&&wordIdxRf.current>0){
      e.preventDefault();
      var pi=wordIdxRf.current-1;
      var pe=completedRf.current[pi];
      if(!pe)return;
      completedRf.current=completedRf.current.slice(0,pi);
      if(pe.ok)correctRf.current=Math.max(0,correctRf.current-1);
      wordIdxRf.current=pi;curInputRef.current=pe.input;
      setWordIdx(pi);setCompletedWords(completedRf.current.slice());setCurInput(pe.input);
    }
  },[init]);

  var handleChange=useCallback(function(e){
    if(phaseRef.current==='results')return;
    var val=e.target.value;
    var prev=curInputRef.current;
    curInputRef.current=val;
    if(phaseRef.current!=='typing'&&val.trim())startTyping();
    if(val.slice(-1)===' '){
      var input=val.trim();
      if(!input){setCurInput('');curInputRef.current='';return;}
      var target=wordsRf.current[wordIdxRf.current]||'';
      var ok=input===target;
      if(ok)correctRf.current++;
      completedRf.current=completedRf.current.concat([{word:target,input:input,ok:ok}]);
      setCompletedWords(completedRf.current.slice());
      var ni=wordIdxRf.current+1;
      wordIdxRf.current=ni;curInputRef.current='';
      setWordIdx(ni);setCurInput('');
      if((mode==='words'||mode==='quotes'||mode==='fingers'||practicePhaseRef.current==='drilling')&&ni>=wordsRf.current.length)doFinish();
      return;
    }
    if(val.length>prev.length){
      var pos=val.length-1;
      var typed=val[pos]?val[pos].toUpperCase():'';
      var expCh=(wordsRf.current[wordIdxRf.current]||'')[pos];
      var expUp=expCh?expCh.toUpperCase():'';
      if(typed&&expUp&&typed!==expUp){
        var ne=Object.assign({},keyErrRf.current);
        ne[typed]=(ne[typed]||0)+1;
        keyErrRf.current=ne;setKeyErrors(Object.assign({},ne));
        if(pos>0){
          var prevCh=(wordsRf.current[wordIdxRf.current]||'')[pos-1];
          if(prevCh){
            var bg2=prevCh.toUpperCase()+expUp;
            bigramErrRf.current[bg2]=(bigramErrRf.current[bg2]||0)+1;
          }
        }
      }
    }
    var isLast=(mode==='words'||mode==='quotes'||mode==='fingers'||practicePhaseRef.current==='drilling')&&wordIdxRf.current===wordsRf.current.length-1;

      var ct=wordsRf.current[wordIdxRf.current]||'';
      if(val===ct){
        correctRf.current++;
        completedRf.current=completedRf.current.concat([{word:ct,input:val,ok:true}]);
        setCompletedWords(completedRf.current.slice());

          style:{background:'none',color:wordsOpt===n?CW:CM,border:'none',padding:'7px 14px',fontFamily:FS,fontSize:13,fontWeight:wordsOpt===n?800:500,transition:'color 0.15s'}},String(n));
      }):null,
      (mode==='quotes'&&activeQuote)?h('span',{style:{fontFamily:FS,fontSize:12,color:'#333',fontStyle:'italic',fontWeight:700,marginLeft:4}},'— '+activeQuote.author):null,
      mode==='fingers'?h('div',{style:{display:'flex',alignItems:'center',gap:2}},
        [15,30,60].map(function(t){return h('button',{key:'ft'+t,
          onClick:function(e){e.stopPropagation();setTimeOpt(t);setFingerSub('time');},
          style:{background:'none',color:(fingerSub==='time'&&timeOpt===t)?CW:CM,border:'none',
            padding:'7px 12px',fontFamily:FS,fontSize:12,fontWeight:(fingerSub==='time'&&timeOpt===t)?800:500,transition:'color 0.15s'}},t+'s');}),
        h('div',{style:{width:1,height:14,background:'#1e1e1e',margin:'0 4px'}}),
        [10,25,50].map(function(n){return h('button',{key:'fw'+n,
          onClick:function(e){e.stopPropagation();setWordsOpt(n);setFingerSub('words');},
          style:{background:'none',color:(fingerSub==='words'&&wordsOpt===n)?CW:CM,border:'none',
            padding:'7px 12px',fontFamily:FS,fontSize:12,fontWeight:(fingerSub==='words'&&wordsOpt===n)?800:500,transition:'color 0.15s'}},n+' w');})
      ):null,
      h('button',{onClick:function(e){e.stopPropagation();init();},
        onMouseEnter:function(e){e.currentTarget.style.color=CW;},
        onMouseLeave:function(e){e.currentTarget.style.color='#2a2a2a';},
        style:{marginLeft:'auto',background:'none',border:'none',color:'#2a2a2a',fontFamily:FS,fontSize:22,padding:'0 4px',transition:'color 0.15s',fontWeight:300}},'\u21BB')
    ),

    mode==='fingers'&&!isDrilling&&renderFingerSelector(),

    h('div',{style:{maxWidth:1100,margin:'30px auto 0',padding:'0 36px',position:'relative'}},
      h('div',{style:{position:'absolute',top:0,left:36,right:36,height:28,background:'linear-gradient(to bottom,#0a0a0a 20%,transparent)',zIndex:10,pointerEvents:'none'}}),
      h('div',{ref:containerRef,style:{height:VISIBLE_H+'px',overflow:'hidden',position:'relative'}},
        h('div',{style:{lineHeight:LINE_H,transform:'translateY(-'+scrollOffset+'px)',transition:'transform 0.16s cubic-bezier(0.4,0,0.2,1)',userSelect:'none',paddingTop:'4px'}},
          words.map(function(word,idx){return renderWord(word,idx);})
        )
      ),
      h('div',{style:{position:'absolute',bottom:0,left:36,right:36,height:32,background:'linear-gradient(to top,#0a0a0a 20%,transparent)',zIndex:10,pointerEvents:'none'}}),
      h('input',{ref:inputRef,value:curInput,onChange:handleChange,onKeyDown:handleKeyDown,
        style:{position:'absolute',opacity:0,width:1,height:1,top:0,left:0,pointerEvents:'none'},
        autoComplete:'off',autoCorrect:'off',autoCapitalize:'none',spellCheck:false})
    ),

    h('div',{style:{textAlign:'center',marginTop:24,fontFamily:FS,fontSize:10,fontWeight:700,letterSpacing:3,textTransform:'uppercase',transition:'color 0.4s',userSelect:'none',color:phase==='idle'?'#222':'transparent'}},
      isDrilling?'DRILL MODE \u00B7 TAB / ESC TO EXIT':'START TYPING \u00B7 TAB / ESC TO RESTART \u00B7 BACKSPACE TO FIX PREVIOUS WORD')
  );
}

function StatEl(label,value,color,size){
  return h('div',{key:label},
    h('div',{style:{fontFamily:FS,fontSize:10,fontWeight:800,color:'#333',letterSpacing:4,textTransform:'uppercase',marginBottom:10}},label.toUpperCase()),
    h('div',{style:{fontFamily:FS,fontSize:size,fontWeight:200,color:color,lineHeight:1,letterSpacing:-3}},String(value)));
}
function Label(text){
  return h('div',{style:{fontFamily:FS,fontSize:10,fontWeight:800,color:'#333',letterSpacing:4,textTransform:'uppercase',marginBottom:22}},text.toUpperCase());
}

var root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(TypeMaster));
}); /* end load */

  </script>
</body>
</html>
